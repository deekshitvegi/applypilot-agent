name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: python -m ruff check .
      - name: Validate extension JavaScript
        shell: bash
        run: find extension -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Validate extension manifest
        run: python -m json.tool extension/manifest.json > /dev/null
