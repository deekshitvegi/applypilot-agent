<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ApplyPilot settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">CONNECTION</p>
      <h1>ApplyPilot agent service</h1>
      <p class="intro">
        Use the local service for private candidate data and browser automation. A hosted demo
        URL can demonstrate public, stateless features only.
      </p>
      <form id="settings-form">
        <label for="api-base">Service URL</label>
        <input id="api-base" type="url" required />
        <div class="actions">
          <button type="submit">Save and test</button>
          <button id="use-local" class="secondary" type="button">Use local service</button>
        </div>
      </form>
      <p id="result" class="result" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
